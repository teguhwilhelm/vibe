<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibe — My Attendance</title>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="app-shell" id="shell">
  <aside class="sidebar">
    <div class="pulse-mark" id="sideMark"></div>
    <div class="nav-group">
      <a class="nav-link active" data-view="home">🏠 Home</a>
      <a class="nav-link" data-view="history">🗓️ Attendance history</a>
      <a class="nav-link" data-view="leave">🌴 Leave</a>
    </div>
    <div class="sidebar-foot">
      <div class="who"><strong id="whoName">—</strong><span id="whoRole"></span></div>
      <a class="nav-link" id="logoutBtn">↩ Sign out</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <button class="menu-btn" id="menuBtn">☰</button>
        <h1 id="pageTitle">Good to see you</h1>
        <div class="sub" id="pageSub">Here's your attendance at a glance.</div>
      </div>
    </div>

    <section id="view-home">
      <div class="grid grid-2" style="align-items:start;">
        <div class="clock-card">
          <div class="date" id="clockDate">—</div>
          <div class="time mono" id="clockTime">--:--:--</div>
          <div class="status-line" id="statusLine">Loading today's status…</div>
          <div class="clock-actions">
            <button class="btn btn-clockin" id="btnClockIn">Clock in</button>
            <button class="btn btn-clockout" id="btnClockOut" disabled>Clock out</button>
          </div>
        </div>
        <div class="card">
          <h3>Today's shift</h3>
          <div id="shiftInfo" style="font-size:14px;color:var(--muted);">Loading…</div>
          <div style="margin-top:18px;">
            <h3 style="margin-bottom:8px;">This week</h3>
            <div id="weekMini" class="table-wrap"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="view-history" style="display:none;">
      <div class="toolbar">
        <div class="tabs-row" id="scopeTabs">
          <button data-scope="day" class="active">Day</button>
          <button data-scope="week">Week</button>
          <button data-scope="month">Month</button>
        </div>
        <div class="field">
          <input type="date" id="historyDate" />
        </div>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-ghost btn-sm" id="exportExcel">⬇ Excel</button>
        <button class="btn btn-ghost btn-sm" id="exportPdf">⬇ PDF</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table id="historyTable">
            <thead><tr><th>Date</th><th>Shift</th><th>Clock in</th><th>Clock out</th><th>Status</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="view-leave" style="display:none;">
      <div class="grid" style="grid-template-columns: 1fr 1.4fr; align-items:start;">
        <div class="card">
          <h3>Request time off</h3>
          <form id="leaveForm">
            <div class="field">
              <label>Type</label>
              <select id="leaveType">
                <option value="annual">Annual leave</option>
                <option value="sick">Sick leave</option>
                <option value="unpaid">Unpaid leave</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field-row">
              <div class="field"><label>Start date</label><input type="date" id="leaveStart" required /></div>
              <div class="field"><label>End date</label><input type="date" id="leaveEnd" required /></div>
            </div>
            <div class="field">
              <label>Reason (optional)</label>
              <textarea id="leaveReason" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Submit request</button>
          </form>
        </div>
        <div class="card">
          <h3>Your requests</h3>
          <div class="table-wrap">
            <table id="leaveTable">
              <thead><tr><th>Type</th><th>Dates</th><th>Status</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/employee.js"></script>
</body>
</html>
